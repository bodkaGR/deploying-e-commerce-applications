databaseChangeLog:
  - changeSet:
      id: 001-create-authors
      author: bohdan
      changes:
        - createTable:
            tableName: authors
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true