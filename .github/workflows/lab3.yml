name: Kubernetes Lab 3

on:
  push:
    branches: [main, lab-2-cicd-automation-container-registry]
  pull_request:
    branches: [main]

jobs:
  k8s:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v4
        with:
          cluster-name: images-gallery-cluster

      - name: Check cluster
        run: kubectl cluster-info

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/postgres
          kubectl rollout status deployment/ecommerce-app

      - name: Run Master Validation Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh
