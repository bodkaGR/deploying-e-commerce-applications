name: Kubernetes Lab 3

on:
  push:
    branches: [main, lab-3-kubernetes-deployment-essentials]
  pull_request:
    branches: [main]

jobs:
  k8s:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Create KinD cluster
        uses: helm/kind-action@v1
        with:
          cluster-name: images-gallery-cluster

      - name: Check cluster
        run: kubectl cluster-info

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Debug pods
        run: |
          echo "### Pods ###"
          kubectl get pods
          echo "### Pod Description ###"
          kubectl describe pods
          echo "### Pod Logs ###"
          kubectl logs -l app=ecommerce --tail=50 || true

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/postgres --timeout=120s
          kubectl rollout status deployment/ecommerce-app --timeout=120s

      - name: Run Master Validation Script
        run: |
          chmod +x ./tests/lab3_test.sh
          ./tests/lab3_test.sh
